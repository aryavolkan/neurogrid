name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gdscript-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Godot
        run: |
          GODOT_VERSION="4.4.1"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Validate GDScript
        run: |
          # Import project first so Godot knows about all scripts
          timeout 30 godot --path . --headless --import || true

          # Check each GDScript file for parse errors
          ERRORS=0
          for f in $(find . -name "*.gd" -not -path "./evolve-core/*" -not -path "./.godot/*"); do
            OUTPUT=$(godot --path . --headless --check-only -s "$f" 2>&1 || true)
            if echo "$OUTPUT" | grep -qi "error"; then
              echo "::error file=$f::Parse error in $f"
              echo "$OUTPUT"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS file(s) have GDScript errors"
            exit 1
          fi
          echo "All GDScript files valid"
