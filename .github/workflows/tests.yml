name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gdtoolkit
        run: pip install 'gdtoolkit==4.*'

      - name: Lint GDScript
        run: gdlint autoloads/ core/ entities/ systems/ world/ ui/ scenes/ tests/

      - name: Install Godot
        run: |
          GODOT_VERSION="4.5"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Import project
        run: |
          timeout 60 godot --path . --headless --import 2>&1 || true

      - name: Validate GDScript (no parse errors)
        run: |
          # Import logs script errors — check for them
          OUTPUT=$(timeout 60 godot --path . --headless --import 2>&1 || true)
          if echo "$OUTPUT" | grep -q "SCRIPT ERROR"; then
            echo "$OUTPUT" | grep "SCRIPT ERROR"
            echo "::error::GDScript parse/compile errors found"
            exit 1
          fi
          echo "All scripts valid"

      - name: Run tests
        run: |
          timeout 120 godot --path . --headless -s tests/test_runner.gd 2>&1 | tee test_output.txt
          if grep -q "FAIL" test_output.txt; then
            echo "::error::Tests failed"
            grep "FAIL" test_output.txt
            exit 1
          fi
          # Verify all suites ran
          SUITES=$(grep -c "tests passed\|FAILED" test_output.txt || true)
          if [ "$SUITES" -lt 12 ]; then
            echo "::error::Expected 12 test suites, only $SUITES completed"
            exit 1
          fi
          echo "All tests passed"
